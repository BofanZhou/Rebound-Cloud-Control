# fly.toml - Fly.io 部署配置
app = "rebound-api"
primary_region = "sin"  # 新加坡，可改为 nrt(东京) 或 sjc(美国)

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
